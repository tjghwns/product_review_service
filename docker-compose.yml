version: "3.9"

services:

  # 1️⃣ DB 먼저 (가장 먼저 준비되어야 함)
  db:
    image: postgres:16
    container_name: product_review_postgres
    restart: always
    environment:
      POSTGRES_DB: product_review_db
      POSTGRES_USER: product_review_user
      POSTGRES_PASSWORD: product_review_password
    ports:
      - "5433:5432"
    volumes:
      - product_review_postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

  # 2️⃣ Redis (Celery가 사용할 큐)
  redis:
    image: redis:7
    container_name: redis-server
    restart: always
    ports:
      - "6379:6379"
    networks:
      - app-network

  # 3️⃣ Django (웹 서버)
  web:
    build: ./backend
    container_name: drf-web
    command: python manage.py runserver 0.0.0.0:8000
    restart: always
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      - db
      - redis
    networks:
      - app-network

  # 4️⃣ FastAPI (AI 서버)
  fastapi:
    build:
      context: ./ai-server
    container_name: fastapi-server
    command: uvicorn main:app --host 0.0.0.0 --port 8001
    restart: always
    volumes:
      - ./ai-server:/app
    ports:
      - "8001:8001"
    networks:
      - app-network

  # 5️⃣ Celery (가장 마지막, 모든 서비스 필요)
  celery:
    build: ./backend
    container_name: celery-worker
    command: celery -A mysite worker --loglevel=info --pool=solo
    restart: always
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    depends_on:
      - db
      - redis
      - web
      - fastapi
    networks:
      - app-network


volumes:
  product_review_postgres_data:


networks:
  app-network:
    driver: bridge