# ================================
# 🔥 요청 제한 (Rate Limit) 설정
# ================================
# [추가] IP 기준 요청 제한 (5 req/sec)
limit_req_zone $binary_remote_addr zone=one:10m rate=5r/s;

server {
    listen 80;
    server_name _;

    client_max_body_size 20M;

    # ================================
    # 🔒 보안 헤더 추가
    # ================================
    # [추가] 클릭재킹 방지
    add_header X-Frame-Options "SAMEORIGIN";

    # [추가] MIME 타입 공격 방지
    add_header X-Content-Type-Options "nosniff";

    # [추가] XSS 방어
    add_header X-XSS-Protection "1; mode=block";

    # [추가] referrer 정책
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # [추가] CSP (Content Security Policy)
    add_header Content-Security-Policy "default-src 'self' 'unsafe-inline' 'unsafe-eval' data:;";

    # [추가] nginx 버전 숨김
    server_tokens off;

    # ================================
    # 🚫 공격 경로 차단
    # ================================

    # [추가] PHP 실행 차단 (우리는 Django라 필요 없음)
    location ~* \.php$ {
        return 444;
    }

    # [추가] 흔한 공격 경로 차단
    location ~* /(wp-admin|phpunit|vendor|cgi-bin|backup|\.env) {
        return 444;
    }

    # [추가] 숨김파일 (.git 등) 접근 차단
    location ~ /\. {
        deny all;
    }

    # ================================
    # 📁 static 파일
    # ================================
    location /static/ {
        alias /app/staticfiles/;
    }

    # ================================
    # 📁 media 파일
    # ================================
    location /media/ {
        alias /app/media/;
    }

    # ================================
    # 🤖 FastAPI 서버
    # ================================
    location /ai/ {
        proxy_pass http://fastapi-server:8001/;

        # [기존 유지]
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # [추가] 요청 제한 적용
        limit_req zone=one burst=10 nodelay;
    }

    # ================================
    # 🌐 Django 서버
    # ================================
    location / {
        proxy_pass http://drf-web:8000;

        # [기존 유지]
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # [추가] 요청 제한 적용
        limit_req zone=one burst=10 nodelay;
    }
}