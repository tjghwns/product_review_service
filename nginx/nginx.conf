# ================================
# 🔥 요청 제한 (Rate Limit) 설정
# ================================
limit_req_zone $binary_remote_addr zone=one:10m rate=5r/s;


# ================================
# 🌐 HTTP → HTTPS 리다이렉트
# ================================
server {
    listen 80;
    server_name product-review-hojun.duckdns.org;

    client_max_body_size 20M;

    location / {
        return 301 https://$host$request_uri;
    }
}


# ================================
# 🔐 HTTPS 서버
# ================================
server {
    listen 443 ssl;
    server_name product-review-hojun.duckdns.org;

    client_max_body_size 20M;

    # ================================
    # 📜 SSL 인증서 경로
    # ================================
    ssl_certificate /etc/letsencrypt/live/product-review-hojun.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/product-review-hojun.duckdns.org/privkey.pem;

    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # ================================
    # 🔒 보안 헤더 추가
    # ================================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self' data:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net https://product-review-static-hj.s3.amazonaws.com https://product-review-static-hj.s3.ap-northeast-2.amazonaws.com; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://product-review-static-hj.s3.amazonaws.com https://product-review-static-hj.s3.ap-northeast-2.amazonaws.com; connect-src 'self' https://cdn.jsdelivr.net; img-src 'self' data: https://product-review-static-hj.s3.amazonaws.com https://product-review-static-hj.s3.ap-northeast-2.amazonaws.com https://product-review-media-hj.s3.amazonaws.com https://product-review-media-hj.s3.ap-northeast-2.amazonaws.com; font-src 'self' data: https://product-review-static-hj.s3.amazonaws.com https://product-review-static-hj.s3.ap-northeast-2.amazonaws.com;" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    server_tokens off;

    # ================================
    # 🚫 공격 경로 차단
    # ================================
    location ~* \.php$ {
        return 444;
    }

    location ~* /(wp-admin|phpunit|vendor|cgi-bin|backup|\.env) {
        return 444;
    }

    location ~ /\. {
        deny all;
    }

    # ================================
    # 📁 static 파일
    # ================================
    location /static/ {
        alias /app/staticfiles/;
    }

    # ================================
    # 📁 media 파일
    # ================================
    location /media/ {
        alias /app/media/;
    }

    # ================================
    # 🤖 FastAPI 서버
    # ================================
    location /ai/ {
        proxy_pass http://fastapi-server:8001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        limit_req zone=one burst=10 nodelay;
    }

    # ================================
    # 🌐 Django 서버
    # ================================
    location / {
        proxy_pass http://drf-web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        limit_req zone=one burst=10 nodelay;
    }
}