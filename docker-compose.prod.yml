services:

  db:
    image: ankane/pgvector:v0.5.1
    container_name: product_review_postgres
    restart: always
    environment:
      POSTGRES_DB: product_review_db
      POSTGRES_USER: product_review_user
      POSTGRES_PASSWORD: product_review_password
    volumes:
      - product_review_postgres_data:/var/lib/postgresql/data
    networks:
      - app-network

  redis:
    image: redis:7
    container_name: redis-server
    restart: always
    networks:
      - app-network

  web:
    build: ./backend
    container_name: drf-web
    command: >
      sh -c "python manage.py migrate && python manage.py collectstatic --noinput && gunicorn mysite.wsgi:application --bind 0.0.0.0:8000"
    restart: always
    env_file:
      - .env
    depends_on:
      - db
      - redis
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    expose:
      - "8000"
    networks:
      - app-network

  celery:
    build: ./backend
    container_name: celery-worker
    command: celery -A mysite worker --loglevel=info --pool=solo
    restart: always
    env_file:
      - .env
    depends_on:
      - db
      - redis
      - web
      - fastapi
    networks:
      - app-network

  fastapi:
    build:
      context: ./ai-server
    container_name: fastapi-server
    command: uvicorn main:app --host 0.0.0.0 --port 8001
    restart: always
    ports:
      - "8001:8001"
    networks:
      - app-network

  nginx:
    image: nginx:stable-alpine
    container_name: nginx-server
    restart: always
    depends_on:
      - web
      - fastapi
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    networks:
      - app-network

volumes:
  product_review_postgres_data:
  static_volume:
  media_volume:

networks:
  app-network:
    driver: bridge